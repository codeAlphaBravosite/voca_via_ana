/* ────────────────────────── PURE FUNCTION: build flat card list ── */
function buildCards(phase) {
  if (phase.id === 1)
    return phase.clusters.flatMap(c =>
      c.pairs.flatMap(p => p.words.map(w => ({ ...w, cluster: p.label, theme: c.theme, charge: p.charge }))));
  if (phase.id === 2)
    return phase.roots.flatMap(r => r.words.map(w => ({ ...w, root: r.root, root_meaning: r.meaning })));
  if (phase.id === 3)
    return phase.verbs.flatMap(v =>
      v.entries.map(e => ({ word: e.form, meaning: e.meaning, example: e.example, exam: e.exam })));
  if (phase.id === 4)
    return phase.groups.flatMap(g =>
      g.items.map(i => ({ word: i.phrase, meaning: i.meaning, example: i.example || "", lang: i.lang, group: g.group, exam: i.exam }))); // Bug #8 fixed: i.phrase (not i.phrase||i.phrase)
  if (phase.id === 5)
    return [
      ...phase.traps[0].pairs.map(p => ({ word: p.a, meaning: p.a_meaning, also: p.b, also_meaning: p.b_meaning, trap: "paronym", exam: p.exam })),
      ...phase.traps[1].words.map(w => ({ word: w.word, meaning: w.primary, secondary: w.secondary, example: w.example_secondary, trap: "secondary", exam: w.exam })),
      ...phase.traps[2].words.map(w => ({ word: w.word, meaning: w.sense1, sense2: w.sense2, example: w.example1, ex2: w.example2, trap: "contronym" })),
    ];
  if (phase.id === 6) return phase.words;
  return [];
}

/* ────────────────────────── HELPER COMPONENTS ─────────────────── */
function ChargeTag({ charge }) {
  if (!charge) return null;
  const map = {
    "+": { bg: "bg-emerald-500/20 text-emerald-400 border-emerald-500/40", label: "+" },
    "-": { bg: "bg-rose-500/20 text-rose-400 border-rose-500/40",         label: "−" },
    "0": { bg: "bg-amber-500/20 text-amber-400 border-amber-500/40",      label: "N" },
  };
  const s = map[charge] || map["0"];
  return <span className={`text-xs font-bold px-1.5 py-0.5 rounded border ${s.bg}`}>{s.label}</span>;
}

function ExamTag({ exam }) {
  if (!exam) return null;
  return <span className="text-xs bg-amber-500/20 text-amber-400 border border-amber-500/40 rounded px-1.5 py-0.5">★ {exam}</span>;
}

function ProgressRing({ pct, size = 80, stroke = 7, color = "#f59e0b" }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1f2937" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 0.6s ease" }} />
    </svg>
  );
}

/* ────────────────────────── FLASHCARD ─────────────────────────── */
function PhaseFlashcards({ phase, progress, onMarkKnown, onMarkReview }) {
  const [cardIndex, setCardIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  // Bug #12 fixed: memoised — only rebuilt when phase changes
  const cards = useMemo(() => buildCards(phase), [phase]);

  const card     = cards[cardIndex] || null;
  const cardKey  = `p${phase.id}_c${cardIndex}`;
  const known    = progress[cardKey] === "known";
  const review   = progress[cardKey] === "review";

  const knownCount = useMemo(
    () => cards.filter((_, i) => progress[`p${phase.id}_c${i}`] === "known").length,
    [cards, progress, phase.id]
  );
  const pct = cards.length ? Math.round((knownCount / cards.length) * 100) : 0;

  const next = () => { setCardIndex(i => Math.min(i + 1, cards.length - 1)); setFlipped(false); };
  const prev = () => { setCardIndex(i => Math.max(i - 1, 0)); setFlipped(false); };

  if (!card) return <p className="text-gray-400 text-center p-8">No cards here yet.</p>;

  return (
    <div className="flex flex-col gap-4">
      <div className="flex items-center justify-between text-sm">
        <span className="text-gray-400">{cardIndex + 1} / {cards.length}</span>
        <span style={{ color: phase.color }} className="font-bold">{knownCount} mastered ({pct}%)</span>
      </div>
      <div className="h-1.5 bg-gray-800 rounded-full">
        <div className="h-1.5 rounded-full transition-all duration-500" style={{ width: `${pct}%`, background: phase.color }} />
      </div>

      {/* ── FLIP CARD ──
          Bug #6 fixed: wrapper has a generous explicit height (300px) so
          both faces are fully visible. Back uses overflow-y-auto within
          that defined space — no more silent clipping of rich Phase 5 cards. */}
      <div className="relative cursor-pointer select-none" style={{ perspective: "1000px", height: 300 }}
        onClick={() => setFlipped(f => !f)}>
        <div style={{
          transition: "transform 0.45s cubic-bezier(.4,0,.2,1)",
          transformStyle: "preserve-3d",
          transform: flipped ? "rotateY(180deg)" : "rotateY(0deg)",
          position: "absolute", inset: 0,
        }}>
          {/* Front */}
          <div style={{ backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden" }}
            className="absolute inset-0 rounded-2xl border border-gray-700 bg-gray-900 flex flex-col items-center justify-center p-6 gap-3">
            <div className="flex gap-2 flex-wrap justify-center">
              {card.charge  && <ChargeTag charge={card.charge} />}
              {card.exam    && <ExamTag exam={card.exam} />}
              {card.cluster && <span className="text-xs text-gray-500 border border-gray-700 rounded px-2 py-0.5">{card.cluster}</span>}
              {card.root    && <span className="text-xs rounded px-2 py-0.5" style={{ background: phase.color+"22", color: phase.color, border:`1px solid ${phase.color}44` }}>{card.root}</span>}
              {card.group   && <span className="text-xs text-gray-500 border border-gray-700 rounded px-2 py-0.5">{card.group}</span>}
              {card.trap    && <span className="text-xs bg-red-500/20 text-red-400 border border-red-500/40 rounded px-2 py-0.5">{card.trap}</span>}
            </div>
            <p className="text-3xl font-bold text-white text-center leading-tight">{card.word}</p>
            <p className="text-gray-500 text-sm">Tap to reveal →</p>
            {known  && <div className="absolute top-3 right-3 w-7 h-7 rounded-full bg-emerald-500/20 border border-emerald-500/40 flex items-center justify-center text-emerald-400 text-sm">✓</div>}
            {review && <div className="absolute top-3 right-3 w-7 h-7 rounded-full bg-rose-500/20 border border-rose-500/40 flex items-center justify-center text-rose-400 text-sm">↩</div>}
          </div>

          {/* Back */}
          <div style={{ backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", transform: "rotateY(180deg)", background: "#0f172a", borderColor: phase.color+"55" }}
            className="absolute inset-0 rounded-2xl border flex flex-col p-5 gap-2.5 overflow-y-auto">
            <p className="text-xl font-bold text-white flex-shrink-0">{card.word}</p>
            <div className="flex-shrink-0">
              <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">Meaning</p>
              <p className="text-gray-200 text-sm">{card.meaning}</p>
            </div>
            {card.secondary && <div className="flex-shrink-0">
              <p className="text-xs text-rose-400 uppercase tracking-wider mb-1">⚠ Secondary Meaning</p>
              <p className="text-gray-200 text-sm">{card.secondary}</p>
            </div>}
            {card.root_meaning && <div className="flex-shrink-0">
              <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">Root</p>
              <p className="text-gray-400 text-sm">{card.root} = {card.root_meaning}</p>
              {card.root_part && <p className="text-gray-400 text-sm">{card.root_part}</p>}
            </div>}
            {card.example && <div className="flex-shrink-0">
              <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">Example</p>
              <p className="text-gray-300 text-sm italic">"{card.example}"</p>
            </div>}
            {card.also && <div className="p-2.5 bg-amber-500/10 rounded-lg border border-amber-500/20 flex-shrink-0">
              <p className="text-xs text-amber-400 font-bold mb-1">⚠ Don't confuse with: {card.also}</p>
              <p className="text-gray-300 text-sm">{card.also_meaning}</p>
            </div>}
            {card.sense2 && <div className="p-2.5 bg-purple-500/10 rounded-lg border border-purple-500/20 flex-shrink-0">
              <p className="text-xs text-purple-400 font-bold mb-1">↔ Opposite sense</p>
              <p className="text-gray-300 text-sm">{card.sense2}</p>
              {card.ex2 && <p className="text-gray-400 text-xs italic mt-1">"{card.ex2}"</p>}
            </div>}
            {card.lang && <p className="text-xs text-gray-500 flex-shrink-0">Language: {card.lang}</p>}
            {card.exam && <div className="flex-shrink-0"><ExamTag exam={card.exam} /></div>}
          </div>
        </div>
      </div>

      {flipped && (
        <div className="flex gap-3">
          <button onClick={(e) => { e.stopPropagation(); onMarkReview(cardKey); next(); }}
            className="flex-1 py-3 rounded-xl border border-rose-500/40 bg-rose-500/10 text-rose-400 font-bold text-sm active:scale-95 transition-transform">
            ↩ Review Again
          </button>
          <button onClick={(e) => { e.stopPropagation(); onMarkKnown(cardKey); next(); }}
            className="flex-1 py-3 rounded-xl border border-emerald-500/40 bg-emerald-500/10 text-emerald-400 font-bold text-sm active:scale-95 transition-transform">
            ✓ Got It!
          </button>
        </div>
      )}

      <div className="flex gap-2">
        <button onClick={prev} disabled={cardIndex === 0}
          className="flex-1 py-2.5 rounded-xl bg-gray-800 text-gray-300 disabled:opacity-30 text-sm font-medium active:scale-95 transition-transform">
          ← Prev
        </button>
        <button onClick={next} disabled={cardIndex === cards.length - 1}
          className="flex-1 py-2.5 rounded-xl bg-gray-800 text-gray-300 disabled:opacity-30 text-sm font-medium active:scale-95 transition-transform">
          Next →
        </button>
      </div>
    </div>
  );
}

/* ────────────────────────── QUIZ ENGINE ───────────────────────── */
const TYPE_LABELS = {
  odd_one_out: "Odd One Out", synonym: "Synonym", antonym: "Antonym",
  contextual: "Contextual", double_blank: "Double Blank",
  analogy: "Analogy", word_usage: "Word Usage", paronym: "Paronym Trap", spelling: "Spelling",
};

/* Bug #1 fixed: key={q.id} in parent forces full remount between questions
   so `selected` always resets to null.
   Bug #2 fixed: guard checks `selected !== null` to block the 300ms window. */
function QuizQuestion({ q, onAnswer, answered }) {
  const [selected, setSelected] = useState(null);

  const handleSelect = (idx) => {
    if (answered || selected !== null) return; // Bug #2 fixed
    setSelected(idx);
    setTimeout(() => onAnswer(idx === q.answer), 300);
  };

  const getOpts = () => {
    if (q.type === "odd_one_out")  return q.words;
    if (q.type === "double_blank") return q.options.map(o => `Blank 1: "${o.a}"   ·   Blank 2: "${o.b}"`);
    return q.options;
  };

  const optClass = (i) => {
    const base = "w-full text-left px-4 py-3.5 rounded-xl transition-all text-sm leading-relaxed active:scale-95";
    if (selected === null && !answered) return `${base} border border-gray-700 bg-gray-800/40 text-gray-200`;
    if (i === q.answer)                  return `${base} border border-emerald-500 bg-emerald-500/10 text-emerald-100`;
    if (i === selected && i !== q.answer)return `${base} border border-rose-500 bg-rose-500/10 text-rose-100`;
    return `${base} border border-gray-700/40 bg-gray-800/20 text-gray-500 opacity-60`;
  };

  return (
    <div className="flex flex-col gap-4">
      <span className="text-xs self-start rounded px-2 py-1 bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 font-medium">
        {TYPE_LABELS[q.type] || q.type}
      </span>
      {q.word && (
        <div className="text-center">
          <p className="text-xs text-gray-500 uppercase tracking-wider">Target Word</p>
          <p className="text-2xl font-bold text-amber-400">{q.word}</p>
        </div>
      )}
      <div className="bg-gray-800/50 rounded-xl p-4 border border-gray-700">
        <p className="text-gray-100 text-base leading-relaxed whitespace-pre-line">{q.question}</p>
      </div>
      <div className="flex flex-col gap-2.5">
        {getOpts().map((opt, i) => (
          <button key={i} onClick={() => handleSelect(i)} className={optClass(i)}>
            <span className="font-bold text-gray-500 mr-2">{String.fromCharCode(65 + i)}.</span>
            {opt}
            {(selected !== null) && i === q.answer && <span className="ml-2 text-emerald-400 font-bold">✓</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

function QuizMode({ quizProgress, onUpdateQuiz }) {
  const [filter, setFilter]       = useState("all");
  const [qIdx, setQIdx]           = useState(0);
  const [answered, setAnswered]   = useState(false);
  const [showExp, setShowExp]     = useState(false);
  const [score, setScore]         = useState({ correct: 0, total: 0 });
  const [done, setDone]           = useState(false);

  const filtered = useMemo(
    () => filter === "all" ? QUIZ_QUESTIONS : QUIZ_QUESTIONS.filter(q => q.type === filter),
    [filter]
  );
  const q = filtered[qIdx] || filtered[0];

  const handleAnswer = (correct) => {
    setAnswered(true); setShowExp(true);
    setScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
    onUpdateQuiz(q.id, correct);
  };

  const next = () => {
    if (qIdx + 1 >= filtered.length) { setDone(true); return; }
    setQIdx(i => i + 1); setAnswered(false); setShowExp(false);
  };

  const changeFilter = (t) => {
    setFilter(t); setQIdx(0); setAnswered(false); setShowExp(false); setDone(false);
  };

  const restart = () => { setQIdx(0); setAnswered(false); setShowExp(false); setScore({ correct: 0, total: 0 }); setDone(false); };

  if (done) {
    const acc = Math.round((score.correct / score.total) * 100);
    return (
      <div className="flex flex-col items-center gap-6 py-10">
        <div className="relative">
          <ProgressRing pct={acc} size={120} stroke={10} color={acc >= 80 ? "#10b981" : "#f59e0b"} />
          <div className="absolute inset-0 flex flex-col items-center justify-center">
            <p className="text-3xl font-black text-white">{acc}%</p>
          </div>
        </div>
        <p className="text-xl font-bold text-white">Session Complete!</p>
        <p className="text-gray-400">{score.correct} / {score.total} correct</p>
        {acc < 80 && <p className="text-amber-400 text-sm text-center max-w-xs">Review the explanations for missed questions — note which technique you should have applied.</p>}
        <button onClick={restart} className="px-8 py-3 rounded-xl bg-amber-500 text-black font-bold text-sm active:scale-95 transition-transform">Practice Again</button>
      </div>
    );
  }

  return (
    <div className="flex flex-col gap-4">
      <div className="overflow-x-auto -mx-4 px-4">
        <div className="flex gap-2 pb-1" style={{ width: "max-content" }}>
          {["all", ...Object.keys(TYPE_LABELS)].map(t => (
            <button key={t} onClick={() => changeFilter(t)}
              className={`text-xs px-3 py-1.5 rounded-full border whitespace-nowrap transition-all ${
                filter === t ? "bg-amber-500 text-black border-amber-500 font-bold" : "bg-gray-800 text-gray-400 border-gray-700"
              }`}>
              {t === "all" ? "All Types" : TYPE_LABELS[t]}
            </button>
          ))}
        </div>
      </div>
      <div className="flex justify-between text-sm text-gray-500">
        <span>Q {qIdx + 1} / {filtered.length}</span>
        <span className="text-emerald-400">{score.correct} / {score.total} correct</span>
      </div>

      {/* key=q.id forces full remount → selected state resets (Bug #1 fixed) */}
      <QuizQuestion key={q.id} q={q} onAnswer={handleAnswer} answered={answered} />

      {showExp && (
        <div className="bg-gray-800/60 rounded-xl p-4 border border-gray-600 flex flex-col gap-2">
          <p className="text-xs text-amber-400 font-bold uppercase tracking-wider">Explanation</p>
          <p className="text-gray-200 text-sm leading-relaxed">{q.explanation}</p>
          {q.tip && (
            <div className="mt-1 p-3 bg-indigo-500/10 rounded-lg border border-indigo-500/20">
              <p className="text-xs text-indigo-400 font-bold">⚡ Technique Tip</p>
              <p className="text-gray-300 text-sm mt-1">{q.tip}</p>
            </div>
          )}
        </div>
      )}

      {answered && (
        <button onClick={next} className="w-full py-3 rounded-xl bg-amber-500 text-black font-bold text-sm active:scale-95 transition-transform">
          Next Question →
        </button>
      )}
    </div>
  );
}

/* ────────────────────────── TECHNIQUES ───────────────────────── */

              {t.example.opts.map((o, i) => (

/* ────────────────────────── HOME TAB ──────────────────────────── */
function HomeTab({ cardProgress, quizProgress, onStartLearn, onStartQuiz }) {
  const totals = useMemo(() => PHASES.reduce((acc, p) => acc + buildCards(p).length, 0), []);
  const knownCards   = Object.values(cardProgress).filter(v => v === "known").length;
  const quizAnswered = Object.keys(quizProgress).length;
  const quizCorrect  = Object.values(quizProgress).filter(v => v === true).length;
  const masterPct    = totals ? Math.round((knownCards / totals) * 100) : 0;
  const quizAcc      = quizAnswered > 0 ? Math.round((quizCorrect / quizAnswered) * 100) : 0;

  const phaseStats = useMemo(() => PHASES.map(p => {
    const cards = buildCards(p);
    const known = cards.filter((_, i) => cardProgress[`p${p.id}_c${i}`] === "known").length;
    return { ...p, total: cards.length, known, pct: cards.length ? Math.round((known / cards.length) * 100) : 0 };
  }), [cardProgress]);

  return (
    <div className="flex flex-col gap-5">
      <div className="rounded-2xl border border-amber-500/20 bg-gradient-to-br from-amber-500/10 to-transparent p-4">
        <p className="text-xs text-amber-400 font-bold uppercase tracking-widest mb-3">COMMAND STATUS</p>
        <div className="flex items-center gap-5">
          <div className="relative flex-shrink-0">
            <ProgressRing pct={masterPct} size={90} stroke={8} color="#f59e0b" />
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <p className="text-2xl font-black text-white">{masterPct}%</p>
            </div>
          </div>
          <div className="flex flex-col gap-2">
            <div>
              <p className="text-gray-500 text-xs">Cards Mastered</p>
              <p className="text-white font-bold">{knownCards} / {totals}</p>
            </div>
            <div>
              <p className="text-gray-500 text-xs">Quiz Accuracy</p>
              <p className="font-bold" style={{ color: quizAcc >= 80 ? "#10b981" : quizAcc >= 60 ? "#f59e0b" : "#ef4444" }}>
                {quizAcc}% ({quizAnswered} attempts)
              </p>
            </div>
          </div>
        </div>
      </div>

      <div>
        <p className="text-xs text-gray-500 uppercase tracking-wider mb-3 font-bold">Phase Progress</p>
        <div className="grid grid-cols-3 gap-2">
          {phaseStats.map(p => (
            <button key={p.id} onClick={onStartLearn}
              className="rounded-xl border border-gray-700 bg-gray-900 p-3 flex flex-col gap-2 active:scale-95 transition-transform text-left">
              <p className="text-lg">{p.icon}</p>
              <p className="text-xs text-gray-400 leading-tight">{p.label}</p>
              <div className="h-1 bg-gray-800 rounded-full">
                <div className="h-1 rounded-full" style={{ width: `${p.pct}%`, background: p.color }} />
              </div>
              <p className="text-xs font-bold" style={{ color: p.color }}>{p.pct}%</p>
            </button>
          ))}
        </div>
      </div>

      <div>
        <p className="text-xs text-gray-500 uppercase tracking-wider mb-3 font-bold">Today's 45-Min Plan</p>
        <div className="flex flex-col gap-2">
          {[
            { time: "15 min", label: "Learn",   sub: "10 synonyms · 5 phrasal verbs · 10 idioms", icon: "📚", color: "#f59e0b" },
            { time: "15 min", label: "Practice",sub: "Make sentences for the 5 hardest words",    icon: "✍️", color: "#10b981" },
            { time: "15 min", label: "Revise",  sub: "Yesterday · 7 days ago · 30 days ago",      icon: "🔁", color: "#6366f1" },
          ].map((item, i) => (
            <div key={i} className="flex items-center gap-3 rounded-xl border border-gray-700 bg-gray-900 p-3">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center text-base flex-shrink-0" style={{ background: item.color+"22" }}>{item.icon}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <p className="text-white font-bold text-sm">{item.label}</p>
                  <span className="text-xs rounded px-1.5 py-0.5" style={{ background: item.color+"22", color: item.color }}>{item.time}</span>
                </div>
                <p className="text-gray-500 text-xs">{item.sub}</p>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <button onClick={onStartLearn} className="py-3 rounded-xl bg-amber-500 text-black font-bold text-sm active:scale-95 transition-transform">📚 Study Cards</button>
        <button onClick={onStartQuiz}  className="py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm active:scale-95 transition-transform">⚡ Take Quiz</button>
      </div>

      <div className="rounded-2xl border border-rose-500/20 bg-rose-500/5 p-4">
        <p className="text-xs text-rose-400 font-bold uppercase tracking-wider mb-3">🚨 Zero-Error Exam Checklist</p>
        <div className="flex flex-col gap-1.5">
          {[
            "Read the direction: Synonym or Antonym? Write +/− on rough sheet first",
            "Apply Polarity: eliminate options with opposite charge immediately",
            "Grammar Filter: noun, verb, or adjective? Eliminate grammatical mismatches",
            "Check for Twins: two options meaning the same → eliminate both",
            "Look for Root: Mal−, Bene+, Eu+, Anti−, A/An = without",
            "For Matrix: find ONE certain match and use Unique Anchor only",
          ].map((step, i) => (
            <div key={i} className="flex gap-2 items-start text-sm">

              <span className="text-gray-300">{step}</span>

  const [cardProgress, setCardProgress] = useState({});
  const [quizProgress, setQuizProgress] = useState({});
  const [loaded, setLoaded]             = useState(false);

  useEffect(() => {
    (async () => {
      try { const r = (() => { try { const _v = localStorage.getItem("card_progress"); return _v ? {value:_v} : null; } catch(e){ return null; } })(); if (r) setCardProgress(JSON.parse(r.value)); } catch {}
      try { const r = (() => { try { const _v = localStorage.getItem("quiz_progress"); return _v ? {value:_v} : null; } catch(e){ return null; } })(); if (r) setQuizProgress(JSON.parse(r.value)); } catch {}
      setLoaded(true);
    })();
  }, []);

  const onMarkKnown = useCallback((key) => {
    setCardProgress(prev => {
      const next = { ...prev, [key]: "known" };
      (() => { try { localStorage.setItem("card_progress", JSON.stringify(next)); } catch(e){} })();
      return next;
    });
  }, []);

  const onMarkReview = useCallback((key) => {
    setCardProgress(prev => {
      const next = { ...prev, [key]: "review" };
      (() => { try { localStorage.setItem("card_progress", JSON.stringify(next)); } catch(e){} })();
      return next;
    });
  }, []);

  const onUpdateQuiz = useCallback((id, correct) => {
    setQuizProgress(prev => {
      const next = { ...prev, [id]: correct };
      (() => { try { localStorage.setItem("quiz_progress", JSON.stringify(next)); } catch(e){} })();
      return next;
    });

  const TABS = [
    { id: "home",   label: "HQ",     icon: "⬡" },
    { id: "learn",  label: "Learn",  icon: "📚" },
    { id: "quiz",   label: "Quiz",   icon: "⚡" },
    { id: "tricks", label: "Tricks", icon: "🧮" },

  if (!loaded) return (
    <div className="min-h-screen bg-gray-950 flex items-center justify-center">
      <div className="text-amber-400 text-xl animate-pulse">Loading…</div>
    </div>
  );

  return (
    <div className="min-h-screen bg-gray-950 text-white flex flex-col" style={{ fontFamily: "'DM Sans', system-ui, sans-serif" }}>

                    { prefix: "LOQU / DICT", charge: "0", ex: "Loquacious, Dictate" },
                    { prefix: "OMNI",        charge: "+", ex: "Omniscient, Omnipotent" },

                    ["Prescribe","Authorize","Proscribe","Prohibit ★2024"],
                    ["Flounder","Struggle helplessly","Founder","Sink/Fail"],
                    ["Discreet","Tactful/Careful","Discrete","Separate/Distinct"],
                  ].map(([a,am,b,bm]) => (
                    <div key={a} className="grid grid-cols-2 gap-2 text-xs">
                      <div className="bg-gray-900 rounded-lg p-2 border border-gray-700">
                        <p className="font-bold text-white">{a}</p><p className="text-gray-400">{am}</p>
                      </div>
                      <div className="bg-gray-900 rounded-lg p-2 border border-gray-700">
                        <p className="font-bold text-white">{b}</p><p className="text-gray-400">{bm}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="fixed bottom-0 left-0 right-0 z-50 bg-gray-950/95 backdrop-blur border-t border-gray-800">
        <div className="max-w-lg mx-auto flex">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex-1 flex flex-col items-center py-3 gap-1 transition-all ${tab === t.id ? "text-amber-400" : "text-gray-600"}`}>
              <span className="text-xl leading-none">{t.icon}</span>
              <span className="text-xs font-bold">{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<VocabMaster />);
  </script>
</body>
