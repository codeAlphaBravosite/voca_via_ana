function buildCards(phase){
 if(phase.id===1) return phase.clusters.flatMap(c=>c.pairs.flatMap(p=>p.words.map(w=>({...w,cluster:p.label,theme:c.theme,charge:p.charge}))));
 if(phase.id===2) return phase.roots.flatMap(r=>r.words.map(w=>({...w,root:r.root,root_meaning:r.meaning})));
 if(phase.id===3) return phase.verbs.flatMap(v=>v.entries.map(e=>({word:e.form,meaning:e.meaning,example:e.example,exam:e.exam})));
 if(phase.id===4) return phase.groups.flatMap(g=>g.items.map(i=>({word:i.phrase,meaning:i.meaning,example:i.example||"",lang:i.lang,group:g.group,exam:i.exam})));
 if(phase.id===5) return[
  ...phase.traps[0].pairs.map(p=>({word:p.a,meaning:p.a_meaning,also:p.b,also_meaning:p.b_meaning,trap:"paronym",exam:p.exam})),
  ...phase.traps[1].words.map(w=>({word:w.word,meaning:w.primary,secondary:w.secondary,example:w.ex2,trap:"secondary",exam:w.exam})),
  ...phase.traps[2].words.map(w=>({word:w.word,meaning:w.s1,sense2:w.s2,example:w.e1,ex2:w.e2,trap:"contronym"})),
 ];
 if(phase.id===6) return phase.words;
 return[];
}

 const[cls,lbl]=map[charge]||map["0"];

function ProgressRing({pct,size=80,stroke=7,color="#f59e0b"}){
 const r=(size-stroke)/2,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;
 return html`<svg width=${size} height=${size} style=${{transform:"rotate(-90deg)"}}>
  <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="#1f2937" stroke-width=${stroke}/>
  <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${color} stroke-width=${stroke}
   stroke-dasharray=${circ} stroke-dashoffset=${offset} stroke-linecap="round"
   style=${{transition:"stroke-dashoffset 0.6s ease"}}/>
 </svg>`;
}

function PhaseFlashcards({phase,progress,onMarkKnown,onMarkReview}){
 const[idx,setIdx]=useState(0);
 const[flipped,setFlipped]=useState(false);
 const cards=useMemo(()=>buildCards(phase),[phase]);
 const card=cards[idx]||null;
 const ckey=`p${phase.id}_c${idx}`;
 const known=progress[ckey]==="known";
 const review=progress[ckey]==="review";
 const knownCount=useMemo(()=>cards.filter((_,i)=>progress[`p${phase.id}_c${i}`]==="known").length,[cards,progress,phase.id]);
 const pct=cards.length?Math.round((knownCount/cards.length)*100):0;
 const next=()=>{setIdx(i=>Math.min(i+1,cards.length-1));setFlipped(false);};
 const prev=()=>{setIdx(i=>Math.max(i-1,0));setFlipped(false);};
 if(!card)return html`<p class="text-gray-400 text-center p-8">No cards here.</p>`;
 return html`<div class="flex flex-col gap-4">
  <div class="flex items-center justify-between text-sm">
   <span class="text-gray-400">${idx+1} / ${cards.length}</span>
   <span style=${{color:phase.color}} class="font-bold">${knownCount} mastered (${pct}%)</span>
  </div>
  <div class="h-1.5 bg-gray-800 rounded-full">
   <div class="h-1.5 rounded-full transition-all duration-500" style=${{width:`${pct}%`,background:phase.color}}></div>
  </div>
  <div class="flip-wrap" style=${{height:"300px"}}>
   <div class=${`flip-inner${flipped?" flipped":""}`} onClick=${()=>setFlipped(f=>!f)} style=${{cursor:"pointer"}}>
    <div class="flip-face flip-front border border-gray-700 bg-gray-900 flex flex-col items-center justify-center p-6 gap-3 rounded-2xl">
     <div class="flex gap-2 flex-wrap justify-center">
      ${card.charge&&html`<${ChargeTag} charge=${card.charge}/>`}
      ${card.exam&&html`<${ExamTag} exam=${card.exam}/>`}
      ${card.cluster&&html`<span class="text-xs text-gray-500 border border-gray-700 rounded px-2 py-0.5">${card.cluster}</span>`}
      ${card.root&&html`<span class="text-xs rounded px-2 py-0.5" style=${{background:phase.color+"22",color:phase.color,border:`1px solid ${phase.color}44`}}>${card.root}</span>`}
      ${card.group&&html`<span class="text-xs text-gray-500 border border-gray-700 rounded px-2 py-0.5">${card.group}</span>`}
      ${card.trap&&html`<span class="text-xs bg-red-500/20 text-red-400 border border-red-500/40 rounded px-2 py-0.5">${card.trap}</span>`}
     </div>
     <p class="text-3xl font-bold text-white text-center leading-tight">${card.word}</p>
     <p class="text-gray-500 text-sm">Tap to reveal →</p>
     ${known&&html`<div class="absolute top-3 right-3 w-7 h-7 rounded-full bg-emerald-500/20 border border-emerald-500/40 flex items-center justify-center text-emerald-400 text-sm">✓</div>`}
     ${review&&html`<div class="absolute top-3 right-3 w-7 h-7 rounded-full bg-rose-500/20 border border-rose-500/40 flex items-center justify-center text-rose-400 text-sm">↩</div>`}
    </div>
    <div class="flip-face flip-back border flex flex-col p-5 gap-2.5 overflow-y-auto rounded-2xl" style=${{background:"#0f172a",borderColor:phase.color+"55"}}>
     <p class="text-xl font-bold text-white flex-shrink-0">${card.word}</p>
     <div class="flex-shrink-0"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Meaning</p><p class="text-gray-200 text-sm">${card.meaning}</p></div>
     ${card.secondary&&html`<div class="flex-shrink-0"><p class="text-xs text-rose-400 uppercase tracking-wider mb-1">⚠ Secondary Meaning (Exam Trap!)</p><p class="text-gray-200 text-sm">${card.secondary}</p></div>`}
     ${card.root_meaning&&html`<div class="flex-shrink-0"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Root</p><p class="text-gray-400 text-sm">${card.root} = ${card.root_meaning}</p>${card.root_part&&html`<p class="text-gray-400 text-sm">${card.root_part}</p>`}</div>`}
     ${card.example&&html`<div class="flex-shrink-0"><p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Example</p><p class="text-gray-300 text-sm italic">"${card.example}"</p></div>`}
     ${card.also&&html`<div class="p-2.5 bg-amber-500/10 rounded-lg border border-amber-500/20 flex-shrink-0"><p class="text-xs text-amber-400 font-bold mb-1">⚠ Don't confuse with: ${card.also}</p><p class="text-gray-300 text-sm">${card.also_meaning}</p></div>`}
     ${card.sense2&&html`<div class="p-2.5 bg-purple-500/10 rounded-lg border border-purple-500/20 flex-shrink-0"><p class="text-xs text-purple-400 font-bold mb-1">↔ Opposite sense</p><p class="text-gray-300 text-sm">${card.sense2}</p>${card.ex2&&html`<p class="text-gray-400 text-xs italic mt-1">"${card.ex2}"</p>`}</div>`}
     ${card.lang&&html`<p class="text-xs text-gray-500 flex-shrink-0">Language: ${card.lang}</p>`}
     ${card.exam&&html`<div class="flex-shrink-0"><${ExamTag} exam=${card.exam}/></div>`}
    </div>
   </div>

  ${flipped&&html`<div class="flex gap-3">
   <button onClick=${(e)=>{e.stopPropagation();onMarkReview(ckey);next();}} class="flex-1 py-3 rounded-xl border border-rose-500/40 bg-rose-500/10 text-rose-400 font-bold text-sm active:scale-95 transition-transform">↩ Review Again</button>
   <button onClick=${(e)=>{e.stopPropagation();onMarkKnown(ckey);next();}} class="flex-1 py-3 rounded-xl border border-emerald-500/40 bg-emerald-500/10 text-emerald-400 font-bold text-sm active:scale-95 transition-transform">✓ Got It!</button>

  </div>
 </div>`;
}

function QuizQuestion({q,onAnswer,answered}){
 const[selected,setSelected]=useState(null);
 const opts=q.type==="odd_one_out"?q.words:q.type==="double_blank"?q.options.map(o=>`"${o.a}"  ·  "${o.b}"`):q.options;
 const pick=(i)=>{if(answered||selected!==null)return;setSelected(i);setTimeout(()=>onAnswer(i===q.answer),300);};
 const cls=(i)=>{
  const base="w-full text-left px-4 py-3.5 rounded-xl transition-all text-sm leading-relaxed active:scale-95";
  if(selected===null&&!answered)return`${base} border border-gray-700 bg-gray-800/40 text-gray-200`;
  if(i===q.answer)return`${base} border border-emerald-500 bg-emerald-500/10 text-emerald-100`;
  if(i===selected)return`${base} border border-rose-500 bg-rose-500/10 text-rose-100`;
  return`${base} border border-gray-700/40 bg-gray-800/20 text-gray-500 opacity-60`;
 };
 return html`<div class="flex flex-col gap-4">
  <span class="text-xs self-start rounded px-2 py-1 bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 font-medium">${TYPE_LABELS[q.type]||q.type}</span>
  ${q.word&&html`<div class="text-center"><p class="text-xs text-gray-500 uppercase tracking-wider">Target Word</p><p class="text-2xl font-bold text-amber-400">${q.word}</p></div>`}
  <div class="bg-gray-800/50 rounded-xl p-4 border border-gray-700"><p class="text-gray-100 text-base leading-relaxed whitespace-pre-line">${q.question}</p></div>
  <div class="flex flex-col gap-2.5">
   ${opts.map((opt,i)=>html`<button key=${i} onClick=${()=>pick(i)} class=${cls(i)}>
    <span class="font-bold text-gray-500 mr-2">${String.fromCharCode(65+i)}.</span>${opt}${selected!==null&&i===q.answer?html` <span class="text-emerald-400 font-bold">✓</span>`:""}
   </button>`)}
  </div>
 </div>`;
}

function QuizMode({quizProgress,onUpdateQuiz}){
 const[filter,setFilter]=useState("all");
 const[qIdx,setQIdx]=useState(0);
 const[answered,setAnswered]=useState(false);
 const[showExp,setShowExp]=useState(false);
 const[score,setScore]=useState({c:0,t:0});
 const[done,setDone]=useState(false);
 const filtered=useMemo(()=>filter==="all"?QUIZ:QUIZ.filter(q=>q.type===filter),[filter]);
 const q=filtered[qIdx]||filtered[0];
 const handleAnswer=(correct)=>{setAnswered(true);setShowExp(true);setScore(s=>({c:s.c+(correct?1:0),t:s.t+1}));onUpdateQuiz(q.id,correct);};
 const next=()=>{if(qIdx+1>=filtered.length){setDone(true);return;}setQIdx(i=>i+1);setAnswered(false);setShowExp(false);};
 const changeFilter=(t)=>{setFilter(t);setQIdx(0);setAnswered(false);setShowExp(false);setDone(false);setScore({c:0,t:0});};
 const restart=()=>{setQIdx(0);setAnswered(false);setShowExp(false);setScore({c:0,t:0});setDone(false);};
 if(done){
  const acc=Math.round((score.c/score.t)*100);
  return html`<div class="flex flex-col items-center gap-6 py-10">
   <div class="relative"><${ProgressRing} pct=${acc} size=${120} stroke=${10} color=${acc>=80?"#10b981":"#f59e0b"}/>
    <div class="absolute inset-0 flex flex-col items-center justify-center"><p class="text-3xl font-black text-white">${acc}%</p></div></div>
   <p class="text-xl font-bold text-white">Session Complete!</p>
   <p class="text-gray-400">${score.c} / ${score.t} correct</p>
   ${acc<80&&html`<p class="text-amber-400 text-sm text-center max-w-xs">Review explanations for missed questions — note which technique you should have applied.</p>`}
   <button onClick=${restart} class="px-8 py-3 rounded-xl bg-amber-500 text-black font-bold text-sm active:scale-95 transition-transform">Practice Again</button>
  </div>`;
 }
 return html`<div class="flex flex-col gap-4">
  <div class="overflow-x-auto -mx-4 px-4"><div class="flex gap-2 pb-1" style=${{width:"max-content"}}>
   ${["all",...Object.keys(TYPE_LABELS)].map(t=>html`<button key=${t} onClick=${()=>changeFilter(t)}
    class=${`text-xs px-3 py-1.5 rounded-full border whitespace-nowrap transition-all ${filter===t?"bg-amber-500 text-black border-amber-500 font-bold":"bg-gray-800 text-gray-400 border-gray-700"}`}>
    ${t==="all"?"All Types":TYPE_LABELS[t]}</button>`)}
  </div></div>
  <div class="flex justify-between text-sm text-gray-500"><span>Q ${qIdx+1} / ${filtered.length}</span><span class="text-emerald-400">${score.c} / ${score.t} correct</span></div>
  <${QuizQuestion} key=${q.id} q=${q} onAnswer=${handleAnswer} answered=${answered}/>
  ${showExp&&html`<div class="bg-gray-800/60 rounded-xl p-4 border border-gray-600 flex flex-col gap-2">
   <p class="text-xs text-amber-400 font-bold uppercase tracking-wider">Explanation</p>
   <p class="text-gray-200 text-sm leading-relaxed">${q.explanation}</p>
   ${q.tip&&html`<div class="mt-1 p-3 bg-indigo-500/10 rounded-lg border border-indigo-500/20">
    <p class="text-xs text-indigo-400 font-bold">⚡ Technique Tip</p>
    <p class="text-gray-300 text-sm mt-1">${q.tip}</p>
   </div>`}
  </div>`}
  ${answered&&html`<button onClick=${next} class="w-full py-3 rounded-xl bg-amber-500 text-black font-bold text-sm active:scale-95 transition-transform">Next Question →</button>`}
 </div>`;
}

function HomeTab({cardProgress,quizProgress,onStartLearn,onStartQuiz}){
 const totals=useMemo(()=>PHASES.reduce((a,p)=>a+buildCards(p).length,0),[]);
 const known=Object.values(cardProgress).filter(v=>v==="known").length;
 const qa=Object.keys(quizProgress).length;
 const qc=Object.values(quizProgress).filter(v=>v===true).length;
 const mp=totals?Math.round((known/totals)*100):0;
 const qacc=qa>0?Math.round((qc/qa)*100):0;
 const ps=useMemo(()=>PHASES.map(p=>{const cards=buildCards(p);const kn=cards.filter((_,i)=>cardProgress[`p${p.id}_c${i}`]==="known").length;return{...p,total:cards.length,kn,pct:cards.length?Math.round((kn/cards.length)*100):0};}),[ cardProgress]);
 return html`<div class="flex flex-col gap-5">
  <div class="rounded-2xl border border-amber-500/20 bg-gradient-to-br from-amber-500/10 to-transparent p-4">
   <p class="text-xs text-amber-400 font-bold uppercase tracking-widest mb-3">COMMAND STATUS</p>
   <div class="flex items-center gap-5">
    <div class="relative flex-shrink-0"><${ProgressRing} pct=${mp} size=${90} stroke=${8} color="#f59e0b"/>
     <div class="absolute inset-0 flex flex-col items-center justify-center"><p class="text-2xl font-black text-white">${mp}%</p></div></div>
    <div class="flex flex-col gap-2">
     <div><p class="text-gray-500 text-xs">Cards Mastered</p><p class="text-white font-bold">${known} / ${totals}</p></div>
     <div><p class="text-gray-500 text-xs">Quiz Accuracy</p><p class="font-bold" style=${{color:qacc>=80?"#10b981":qacc>=60?"#f59e0b":"#ef4444"}}>${qacc}% (${qa} attempts)</p></div>
    </div>
   </div>
  </div>
  <div><p class="text-xs text-gray-500 uppercase tracking-wider mb-3 font-bold">Phase Progress</p>
   <div class="grid grid-cols-3 gap-2">${ps.map(p=>html`<button key=${p.id} onClick=${onStartLearn} class="rounded-xl border border-gray-700 bg-gray-900 p-3 flex flex-col gap-2 active:scale-95 transition-transform text-left">
    <p class="text-lg">${p.icon}</p><p class="text-xs text-gray-400 leading-tight">${p.label}</p>
    <div class="h-1 bg-gray-800 rounded-full"><div class="h-1 rounded-full" style=${{width:`${p.pct}%`,background:p.color}}></div></div>
    <p class="text-xs font-bold" style=${{color:p.color}}>${p.pct}%</p>
   </button>`)}</div>
  </div>
  <div><p class="text-xs text-gray-500 uppercase tracking-wider mb-3 font-bold">Today's 45-Min Plan</p>
   <div class="flex flex-col gap-2">${[
    {time:"15 min",label:"Learn",sub:"10 synonyms · 5 phrasal verbs · 10 idioms",icon:"📚",color:"#f59e0b"},
    {time:"15 min",label:"Practice",sub:"Make sentences for the 5 hardest words",icon:"✍️",color:"#10b981"},
    {time:"15 min",label:"Revise",sub:"Yesterday · 7 days ago · 30 days ago",icon:"🔁",color:"#6366f1"},
   ].map((item,i)=>html`<div key=${i} class="flex items-center gap-3 rounded-xl border border-gray-700 bg-gray-900 p-3">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-base flex-shrink-0" style=${{background:item.color+"22"}}>${item.icon}</div>
    <div class="flex-1 min-w-0"><div class="flex items-center gap-2"><p class="text-white font-bold text-sm">${item.label}</p><span class="text-xs rounded px-1.5 py-0.5" style=${{background:item.color+"22",color:item.color}}>${item.time}</span></div><p class="text-gray-500 text-xs">${item.sub}</p></div>
   </div>`)}</div>
  </div>
  <div class="grid grid-cols-2 gap-3">
   <button onClick=${onStartLearn} class="py-3 rounded-xl bg-amber-500 text-black font-bold text-sm active:scale-95 transition-transform">📚 Study Cards</button>
   <button onClick=${onStartQuiz} class="py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm active:scale-95 transition-transform">⚡ Take Quiz</button>
  </div>
  <div class="rounded-2xl border border-rose-500/20 bg-rose-500/5 p-4">
   <p class="text-xs text-rose-400 font-bold uppercase tracking-wider mb-3">🚨 Zero-Error Exam Checklist</p>
   <div class="flex flex-col gap-1.5">${[
    "Read the direction: Synonym or Antonym? Write +/− on rough sheet first",
    "Apply Polarity: eliminate options with opposite charge immediately",
    "Grammar Filter: noun, verb, or adjective? Eliminate grammatical mismatches",
    "Check for Twins: two options meaning the same → eliminate both",
    "Look for Root: Mal−, Bene+, Eu+, Anti−, A/An = without",
    "For Matrix: find ONE certain match and use Unique Anchor only",
   ].map((step,i)=>html`<div key=${i} class="flex gap-2 items-start text-sm"><span class="text-rose-400 font-bold flex-shrink-0">${i+1}.</span><span class="text-gray-300">${step}</span></div>`)}</div>
  </div>
 </div>`;
}

function LearnTab({progress,onMarkKnown,onMarkReview}){
 const[activePhase,setActivePhase]=useState(null);
 if(activePhase!==null){
  const phase=PHASES[activePhase];
  return html`<div class="flex flex-col gap-4">
   <button onClick=${()=>setActivePhase(null)} class="self-start text-gray-400 text-sm active:text-white transition-colors">← All Phases</button>
   <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style=${{background:phase.color+"22"}}>${phase.icon}</div>
    <div><p class="text-white font-bold">${phase.name}</p><p class="text-gray-500 text-xs">${phase.desc}</p></div>
   </div>
   <${PhaseFlashcards} phase=${phase} progress=${progress} onMarkKnown=${onMarkKnown} onMarkReview=${onMarkReview}/>
  </div>`;
 }
 return html`<div class="flex flex-col gap-4">
  <div><p class="text-white font-bold text-lg">Study Phases</p><p class="text-gray-500 text-sm mt-1">Tap a phase to begin flashcard study.</p></div>
  ${PHASES.map((p,i)=>html`<button key=${p.id} onClick=${()=>setActivePhase(i)} class="rounded-2xl border border-gray-700 bg-gray-900 p-4 text-left active:scale-95 transition-all">
   <div class="flex items-center gap-3">
    <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl flex-shrink-0" style=${{background:p.color+"22",border:`1px solid ${p.color}44`}}>${p.icon}</div>
    <div class="flex-1 min-w-0"><p class="text-xs font-bold mb-1" style=${{color:p.color}}>${p.label}</p><p class="text-white font-bold text-sm">${p.name}</p><p class="text-gray-500 text-xs">${p.desc}</p></div>
    <span class="text-gray-600 text-lg">›</span>
   </div>
  </button>`)}
 </div>`;
}

   <div class="rounded-xl border border-rose-500/20 bg-rose-500/5 p-3"><p class="text-xs text-rose-400 font-bold mb-2">🔴 RED LIGHT</p><p class="text-xs text-gray-400">BUT · DESPITE · ALTHOUGH · YET</p><p class="text-xs text-gray-500 mt-1">Tone REVERSES direction</p></div>

/* ═══════════════════════════ MAIN APP ═══════════════════════════ */

function VocabMaster(){
 const[tab,setTab]=useState("home");
 const[cardProgress,setCardProgress]=useState({});
 const[quizProgress,setQuizProgress]=useState({});
 const[loaded,setLoaded]=useState(false);
 useEffect(()=>{
  const cp=ls_get("vm_cards");if(cp)setCardProgress(cp);
  const qp=ls_get("vm_quiz");if(qp)setQuizProgress(qp);
  setLoaded(true);
 },[]);
 const onMarkKnown=useCallback((key)=>{setCardProgress(prev=>{const next={...prev,[key]:"known"};ls_set("vm_cards",next);return next;});},[]);
 const onMarkReview=useCallback((key)=>{setCardProgress(prev=>{const next={...prev,[key]:"review"};ls_set("vm_cards",next);return next;});},[]);
 const onUpdateQuiz=useCallback((id,correct)=>{setQuizProgress(prev=>{const next={...prev,[id]:correct};ls_set("vm_quiz",next);return next;});},[]);
 const TABS=[{id:"home",label:"HQ",icon:"⬡"},{id:"learn",label:"Learn",icon:"📚"},{id:"quiz",label:"Quiz",icon:"⚡"},{id:"tricks",label:"Tricks",icon:"🧮"}];
 if(!loaded)return html`<div class="min-h-screen bg-gray-950 flex items-center justify-center"><div class="text-amber-400 text-xl">Loading…</div></div>`;
 return html`<div class="min-h-screen bg-gray-950 text-white flex flex-col" style=${{fontFamily:"'DM Sans',system-ui,sans-serif"}}>
  <div class="sticky top-0 z-40 bg-gray-950/95 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center justify-between">
   <div><p class="text-amber-400 font-black text-base tracking-tight">VOCAB MASTER</p><p class="text-gray-600 text-xs">CUET · Zero Error Method</p></div>
   <div class="flex gap-1">${TABS.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} class=${`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${tab===t.id?"bg-amber-500 text-black":"text-gray-500"}`}>${t.icon}</button>`)}</div>
  </div>
  <div class="flex-1 overflow-y-auto">
   <div class="max-w-lg mx-auto px-4 py-4 pb-24">
    ${tab==="home"&&html`<${HomeTab} cardProgress=${cardProgress} quizProgress=${quizProgress} onStartLearn=${()=>setTab("learn")} onStartQuiz=${()=>setTab("quiz")}/>`}
    ${tab==="learn"&&html`<${LearnTab} progress=${cardProgress} onMarkKnown=${onMarkKnown} onMarkReview=${onMarkReview}/>`}
    ${tab==="quiz"&&html`<${QuizMode} quizProgress=${quizProgress} onUpdateQuiz=${onUpdateQuiz}/>`}
    ${tab==="tricks"&&html`<${TricksTab}/>`}
   </div>
  </div>
  <div class="fixed bottom-0 left-0 right-0 z-50 bg-gray-950/95 backdrop-blur border-t border-gray-800">
   <div class="max-w-lg mx-auto flex">${TABS.map(t=>html`<button key=${t.id} onClick=${()=>setTab(t.id)} class=${`flex-1 flex flex-col items-center py-3 gap-1 transition-all ${tab===t.id?"text-amber-400":"text-gray-600"}`}><span class="text-xl leading-none">${t.icon}</span><span class="text-xs font-bold">${t.label}</span></button>`)}</div>
  </div>
 </div>`;
}

render(html`<${VocabMaster}/>`,document.getElementById('root'));
</script>
